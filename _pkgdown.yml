url: https://felixmil.github.io/esqlabsR/
template:
  bootstrap: 5
authors:
  esqLABS GmbH:
    href: https://esqlabs.com/
    html: <img src='https://esqlabs.github.io/esqlabsR/reference/figures/esqlabs.png'
      style='max-width:33px'>esqLABS
  Indrajeet Patil:
    href: https://sites.google.com/site/indrajeetspatilmorality/
  Felix Mil:
    href: https://github.com/Felixmil
development:
  mode: devel
reference:
- title: Sensitivity analysis
  contents: starts_with("sensitivity")
- title: Project workflow
  contents:
  - contains("Project")
  - contains("Scenario")
  - createPlotsFromExcel
- title: Helpers for data import, wrangling, and export
  contents:
  - matches("^read")
  - matches("^extend")
  - matches("^set")
  - matches("^write")
  - matches("^export")
  - createDataCombinedFromExcel
- title: Helpers for modeling and simulation
  contents:
  - matches("^compare")
  - matches("^calculate")
  - contains("Simulation")
  - ends_with("Function")
  - contains("Quantiles")
  - matches("^geo")
  - sampleRandomValue
  - applyIndividualParameters
  - Distributions
  - LLOQMode
  - ULOQMode
  - loadObservedData
- title: Helpers for plotting
  contents:
  - matches("^plot")
  - matches("^col")
  - contains("color")
  - has_concept("create-plotting-configurations")
  - createDataCombinedFromExcel
- title: Input validation
  contents:
  - matches("^valid")
  - matches("^is")
  - stringToNum
  - GenderInt
  - contains("Types")
  - escapeForRegex
- title: Shiny applications
  contents: matches("^start")
- title: Miscellaneous
  contents:
  - matches("^enum")
  - matches("^get")
  - executeInParallel
  - pathFromClipboard
  - removeFromList
  - sourceAll
  - esqlabsRSettingNames
articles:
- title: Introduction
  navbar: ~
  contents: introduction-esqlabsr
- title: Running simulations
  navbar: Running simulations
  desc: Articles about how to run simulations
  contents:
  - standard-workflow
  - sensitivity-analysis
- title: Processing data
  navbar: Processing data
  desc: Articles about how to process and analyse data
  contents:
  - data-handling
  - visualization-and-reporting
- title: Miscellaneous
  navbar: Miscellaneous
  contents: shiny-apps

